services:
  scheduler-simulator:
    build: .
    container_name: scheduler-simulator
    ports:
      - "8000:8000"
    environment:
      - SIMULATION_CONTINUOUS=${SIMULATION_CONTINUOUS:-true}
      - SIMULATION_CYCLE_SECONDS=${SIMULATION_CYCLE_SECONDS:-5}
      - SIMULATION_PODS_PER_CYCLE=${SIMULATION_PODS_PER_CYCLE:-4}

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: scheduler-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - scheduler-simulator

  grafana:
    image: grafana/grafana:11.3.1
    container_name: scheduler-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
